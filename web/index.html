<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpequiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1.00001,viewport-fit=cover"
    />

    <!-- App Branding -->
    <title>SprintFlow – Employee Task & Sprint Tracker</title>
    <meta
      name="description"
      content="SprintFlow — Track. Sprint. Deliver. A modern task and sprint management app for teams."
    />
    <meta name="theme-color" content="#09090B" />
    <meta name="msapplication-TileColor" content="#09090B" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <style>
      /* Splash / loading screen while JS loads */
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #09090b;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #splash-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #09090b;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #splash-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-logo {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        font-size: 32px;
        font-weight: 400;
        color: #fafafa;
        letter-spacing: -1.5px;
        margin-bottom: 12px;
      }

      .splash-logo span {
        color: #8b5cf6;
        font-weight: 600;
      }

      .splash-bar {
        width: 120px;
        height: 2px;
        background-color: rgba(139, 92, 246, 0.2);
        border-radius: 1px;
        overflow: hidden;
        margin-top: 24px;
      }

      .splash-bar-fill {
        width: 0%;
        height: 100%;
        background-color: #8b5cf6;
        border-radius: 1px;
        animation: loading 1.8s ease-in-out infinite;
      }

      @keyframes loading {
        0% {
          width: 0%;
          margin-left: 0%;
        }
        50% {
          width: 60%;
          margin-left: 20%;
        }
        100% {
          width: 0%;
          margin-left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading splash shown while React/Expo boots -->
    <div id="splash-loader">
      <div class="splash-logo">sprint<span>flow</span></div>
      <div class="splash-bar">
        <div class="splash-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash when app mounts
      const observer = new MutationObserver(() => {
        const root = document.getElementById("root");
        if (root && root.children.length > 0) {
          const splash = document.getElementById("splash-loader");
          if (splash) {
            splash.classList.add("hidden");
            setTimeout(() => splash.remove(), 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), { childList: true });
    </script>
  </body>
</html>
