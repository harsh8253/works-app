<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpequiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- App Branding -->
    <title>SprintFlow – Employee Task & Sprint Tracker</title>
    <meta
      name="description"
      content="SprintFlow — Track. Sprint. Deliver. A modern task and sprint management app for teams."
    />
    <meta name="theme-color" content="#09090B" />
    <meta name="msapplication-TileColor" content="#09090B" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/images/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/images/icon.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <style>
      /* Mobile-first splash – app name only, no logo */
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        background-color: #09090b;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #splash-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #09090b;
        z-index: 9999;
        transition: opacity 0.35s ease-out;
      }

      #splash-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .splash-name {
        display: flex;
        flex-wrap: nowrap;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        font-size: clamp(28px, 9vw, 38px);
        font-weight: 700;
        letter-spacing: -1.2px;
      }

      .splash-name .splash-char {
        opacity: 0;
        transform: scale(0.6);
        animation: splash-char-in 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .splash-name .splash-char.splash-hrm {
        color: #3b82f6;
      }

      .splash-name .splash-char:not(.splash-hrm) {
        color: #fafafa;
      }

      @keyframes splash-char-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .splash-tagline {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 20px;
      }

      .splash-tagline span {
        font-size: 13px;
        font-weight: 500;
        color: #a1a1aa;
      }

      .splash-tagline .splash-line {
        width: 2px;
        height: 12px;
        background: #3b82f6;
        border-radius: 1px;
      }

    </style>
  </head>
  <body>
    <!-- Loading splash – app name only, no logo; letters animate one by one -->
    <div id="splash-loader">
      <div class="splash-name" id="splash-name"></div>
      <div class="splash-tagline">
        <span>Manage</span>
        <div class="splash-line"></div>
        <span>Track</span>
        <div class="splash-line"></div>
        <span>Deliver</span>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Letter-by-letter: ciright (white) + HRM (blue), each char with staggered delay
      (function () {
        const nameEl = document.getElementById("splash-name");
        if (!nameEl) return;
        const part1 = "ciright";
        const part2 = "HRM";
        const delayMs = 80;
        part1.split("").forEach(function (char, i) {
          const span = document.createElement("span");
          span.className = "splash-char";
          span.textContent = char;
          span.style.animationDelay = i * delayMs + "ms";
          nameEl.appendChild(span);
        });
        part2.split("").forEach(function (char, i) {
          const span = document.createElement("span");
          span.className = "splash-char splash-hrm";
          span.textContent = char;
          span.style.animationDelay = (part1.length + i) * delayMs + "ms";
          nameEl.appendChild(span);
        });
      })();

      // Hide splash when app mounts
      const observer = new MutationObserver(() => {
        const root = document.getElementById("root");
        if (root && root.children.length > 0) {
          const splash = document.getElementById("splash-loader");
          if (splash) {
            splash.classList.add("hidden");
            setTimeout(() => splash.remove(), 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), { childList: true });
    </script>
  </body>
</html>
